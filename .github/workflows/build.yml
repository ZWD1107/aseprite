name: Build Aseprite

on: [push, workflow_dispatch]  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest    # Windows 环境编译
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive   # 递归克隆子模块

    - name: Install Dependencies
      shell: powershell
      run: |
        # 安装 Chocolatey 包管理器
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        
        # 安装必要工具
        choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install -y ninja
        choco install -y python3

    - name: Build Skia
      shell: bash
      run: |
        # 克隆 Skia 仓库
        git clone https://github.com/google/skia.git
        cd skia
        
        # 配置并编译 Skia
        python3 tools/git-sync-deps
        bin/gn gen out/Static --args='is_debug=false is_official_build=true skia_use_system_expat=false skia_use_system_icu=false skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false skia_use_system_harfbuzz=false skia_use_system_libheif=false'
        ninja -C out/Static

    - name: Build Aseprite
      shell: bash
      env:
        SKIA_DIR: ${{ github.workspace }}/skia  # 设置 Skia 路径
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DLAF_BACKEND=skia -DSKIA_DIR=$SKIA_DIR ..
        cmake --build . --config Release --target aseprite --parallel 4

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: aseprite-bin
        path: |
          build/bin/aseprite.exe
          build/bin/aseprite.pdb
